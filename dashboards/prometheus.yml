global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "edge_api"
    static_configs:
      - targets: ["edge_api:8000"]
    metrics_path: /metrics

  - job_name: "control_plane"
    static_configs:
      - targets: ["control_plane:8001"]
    metrics_path: /metrics

  - job_name: "mcp_server"
    static_configs:
      - targets: ["mcp_server:8002"]
    metrics_path: /metrics

  - job_name: "knowledge_api"
    static_configs:
      - targets: ["knowledge_api:8003"]
    metrics_path: /metrics

  - job_name: "agent_worker"
    static_configs:
      - targets: ["agent_worker:8004"]
    metrics_path: /metrics
